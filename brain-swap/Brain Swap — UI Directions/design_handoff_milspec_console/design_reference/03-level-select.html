<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Level Select — Brain Swap</title>
<link rel="stylesheet" href="milspec.css" />
<style>
  .board{display:flex;flex-direction:column;}
  .ls{flex:1;padding:18px 22px 20px;display:flex;flex-direction:column;gap:14px;overflow:hidden;}
  .ls-head{display:flex;align-items:flex-end;gap:14px;}
  .ls-head h1{font-family:var(--cond);font-weight:700;letter-spacing:.08em;font-size:20px;margin:0;text-transform:uppercase;color:var(--k-phos);}
  .ls-head .sub{font-size:10px;color:var(--k-dim);letter-spacing:.04em;margin-bottom:2px;}
  .ls-head .legend{margin-left:auto;display:flex;gap:14px;align-items:center;font-size:9px;color:var(--k-dim);letter-spacing:.06em;text-transform:uppercase;}
  .medal{width:13px;height:13px;display:inline-flex;align-items:center;justify-content:center;font-family:var(--cond);font-weight:700;font-size:8px;border-radius:2px;}
  .medal.gold{background:var(--k-amber);color:#0a0d0a;}
  .medal.silver{background:#9aa48c;color:#0a0d0a;}
  .medal.none{border:1px solid var(--k-line2);color:var(--k-line2);}

  .worlds{flex:1;display:grid;grid-template-columns:repeat(5,1fr);gap:11px;min-height:0;}
  .world{display:flex;flex-direction:column;min-height:0;}
  .world .wh{display:flex;flex-direction:column;gap:2px;padding:9px 11px;border:1px solid var(--k-line2);border-bottom:0;background:linear-gradient(180deg,#1a2014,#11150f);}
  .world .wh .wno{font-family:var(--stencil);font-size:13px;color:var(--k-amber);letter-spacing:.04em;}
  .world .wh .wnm{font-family:var(--cond);font-weight:700;letter-spacing:.04em;font-size:12px;color:var(--k-phos);text-transform:uppercase;line-height:1.1;}
  .world .wh .wpr{font-size:8.5px;color:var(--k-dim);letter-spacing:.08em;text-transform:uppercase;margin-top:2px;}
  .world.locked .wh .wno{color:var(--k-olive-dim);}
  .world .levels{flex:1;border:1px solid var(--k-line2);background:var(--k-panel);padding:7px;display:flex;flex-direction:column;gap:6px;overflow:hidden;}

  .lvl{border:1px solid var(--k-line);background:#0e1209;padding:7px 8px;cursor:pointer;position:relative;}
  .lvl:hover{border-color:var(--k-olive);}
  .lvl .lt{display:flex;align-items:baseline;gap:6px;}
  .lvl .lt .ln{font-family:var(--mono);font-weight:600;font-size:10px;color:var(--k-cyan);}
  .lvl .lt .lname{font-size:10px;color:var(--k-phos);line-height:1.15;}
  .lvl .lmeta{display:flex;align-items:center;gap:4px;margin-top:6px;}
  .lvl .medals{display:flex;gap:3px;}
  .lvl .lstat{margin-left:auto;font-family:var(--cond);font-weight:700;font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--k-dim);}
  .lvl.done{}
  .lvl.done .lstat{color:var(--k-ok);}
  .lvl.current{border-color:var(--k-amber);box-shadow:0 0 0 1px var(--k-amber),0 0 16px rgba(224,163,34,.25);background:rgba(224,163,34,.06);}
  .lvl.current .lstat{color:var(--k-amber);}
  .lvl.locked{opacity:.4;cursor:default;}
  .lvl.locked .ln{color:var(--k-olive-dim);}
  .lvl.locked .lstat::before{content:'⬚ ';}
  .lvl .capstone{font-size:8px;color:var(--k-warn);letter-spacing:.08em;text-transform:uppercase;margin-top:3px;}
</style>
</head>
<body>
<div class="fit"><div class="board">
  <div class="sel-strip">
    <div class="brand">BRAIN SWAP · GS-1</div>
    <a href="01-milspec.html">Console</a>
    <a href="01-milspec-report.html">Test Report</a>
    <a class="on" href="01-milspec-levels.html">Level Select</a>
    <a href="01-milspec-send.html">Send Form</a>
    <div class="strip-space"></div>
    <div class="strip-meta">SECONDARY SCREEN B · MISSION ROSTER</div>
  </div>

  <div class="ls">
    <div class="ls-head">
      <h1>Mission Roster</h1>
      <div class="sub">5 worlds · the A-GRA curriculum</div>
      <div class="legend">
        <span><span class="medal gold">T</span> ticks</span>
        <span><span class="medal gold">B</span> bus</span>
        <span><span class="medal gold">S</span> size</span>
        <span>·</span>
        <span><span class="medal gold">▮</span> gold</span>
        <span><span class="medal silver">▮</span> silver</span>
        <span><span class="medal none">▮</span> unearned</span>
      </div>
    </div>

    <div class="worlds" id="worlds"></div>
  </div>

</div></div>
<script>
  const board=document.querySelector('.board');
  function fit(){const s=Math.min(innerWidth/1440,innerHeight/900);board.style.transform=`scale(${s})`;}
  addEventListener('resize',fit);fit();

  // medal codes: g=gold s=silver n=none ; order T,B,S
  const WORLDS=[
    {no:'W0',name:'Listen Before You Speak',levels:[
      {id:'0.1',name:'Boot & Observe',stat:'done',m:'ggs'},
      {id:'0.2',name:'Read the Bus',stat:'done',m:'ggg'},
      {id:'0.3',name:'Who Is Controller?',stat:'done',m:'gsg'},
    ]},
    {no:'W1',name:'HSA / CSA Command',levels:[
      {id:'1.1',name:'The Handshake',stat:'done',m:'ggs'},
      {id:'1.2',name:'First Valid HSA Command',stat:'current',m:'sng'},
      {id:'1.3',name:'Envelope Rejection',stat:'locked',m:'nnn'},
      {id:'1.4',name:'Partial Updates',stat:'locked',m:'nnn'},
      {id:'1.5',name:'Wind & Endurance',stat:'locked',m:'nnn'},
    ]},
    {no:'W2',name:'Waypoint Following',levels:[
      {id:'2.1',name:'Route Upload',stat:'locked',m:'nnn'},
      {id:'2.2',name:'Loiter Patterns',stat:'locked',m:'nnn'},
      {id:'2.3',name:'Read-Only Safety Routes',stat:'locked',m:'nnn'},
      {id:'2.4',name:'Supersede vs Deactivate',stat:'locked',m:'nnn'},
    ]},
    {no:'W3',name:'Curve Following',levels:[
      {id:'3.1',name:'Quintic Béziers',stat:'locked',m:'nnn'},
      {id:'3.2',name:'Append & Blend',stat:'locked',m:'nnn'},
      {id:'3.3',name:'End-of-Curve Behavior',stat:'locked',m:'nnn'},
    ]},
    {no:'W4',name:'Brain Swap',levels:[
      {id:'4.1',name:'Port to a New Body',stat:'locked',m:'nnn'},
      {id:'4.2',name:'Faults & Flinchy FAs',stat:'locked',m:'nnn'},
      {id:'4.3',name:'Heartbeat Discipline',stat:'locked',m:'nnn'},
      {id:'CAP',name:'One Brain · Three Bodies',stat:'locked',m:'nnn',cap:1},
    ]},
  ];
  const mClass={g:'gold',s:'silver',n:'none'};
  function medals(code){
    const labels=['T','B','S'];
    return code.split('').map((c,i)=>`<span class="medal ${mClass[c]}">${labels[i]}</span>`).join('');
  }
  function progress(w){
    const done=w.levels.filter(l=>l.stat==='done').length;
    return `${done}/${w.levels.length} CLEARED`;
  }
  document.getElementById('worlds').innerHTML=WORLDS.map(w=>{
    const allLocked=w.levels.every(l=>l.stat==='locked');
    return `<div class="world ${allLocked?'locked':''}">
      <div class="wh"><span class="wno">${w.no}</span><span class="wnm">${w.name}</span><span class="wpr">${progress(w)}</span></div>
      <div class="levels">
        ${w.levels.map(l=>`
          <div class="lvl ${l.stat}" ${l.stat==='current'?"onclick=\"location.href='01-milspec.html'\"":''}>
            <div class="lt"><span class="ln">${l.id}</span><span class="lname">${l.name}</span></div>
            ${l.cap?'<div class="capstone">◆ Capstone · zero edits</div>':''}
            <div class="lmeta">
              <div class="medals">${medals(l.m)}</div>
              <span class="lstat">${l.stat==='current'?'▶ resume':l.stat==='done'?'cleared':'locked'}</span>
            </div>
          </div>`).join('')}
      </div>
    </div>`;
  }).join('');
</script>
</body>
</html>

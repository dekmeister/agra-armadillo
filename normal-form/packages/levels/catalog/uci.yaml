# Normal Form — UCI 2.5 message catalog (MVP subset: the Command-2 pattern).
#
# Fidelity rule (docs/02-fidelity.md): the game may OMIT, never RENAME or INVENT.
# Every `name:` below and every enum `values:` literal is grep-able as a
# name="…" / value="…" identifier in the UCI XSD; every CERT/RQMT number inside a
# `cite:` is grep-able in the UCI .txt specifications. tools/check-fidelity.ts
# enforces both from the first commit — the catalog is born policed.
#
# Verified against docs/UCI References/ (byte-identical vendored copy of the
# git-ignored docs/References/ sources):
#   UCI_MessageDefinitions_v2_5_0.xsd                          — schema names
#   02_OAC-STD-001_RevI_UCI_StandardDocument_v2_5.txt          — RQMT USTD-xxxxxx
#   04_OAC-SPC-001_RevE_UCI_SchemaStyleAndDesignSpecification…  — CERT SCH-xxxxxx
#   06_OAC-SPC-002_RevA_UCI_NormalizedInterfaceSpecification…   — CERT UNIS-xxxxxx

version: 1
xsd: UCI_MessageDefinitions_v2_5_0.xsd
# Keyed so a validator Finding can cite the exact file its verbatim quote lives in.
sources:
  std: 02_OAC-STD-001_RevI_UCI_StandardDocument_v2_5.txt
  spc: 04_OAC-SPC-001_RevE_UCI_SchemaStyleAndDesignSpecification_v2_5.txt
  unis: 06_OAC-SPC-002_RevA_UCI_NormalizedInterfaceSpecification_v2_5.txt

# --- Enumerations ----------------------------------------------------------
enums:
  - name: CommandStateEnum
    cite: "SPC-001 §5.1.1 (CommandBaseType); XSD CommandStateEnum"
    values: [NEW, UPDATE, CANCEL]

  - name: CommandProcessingStateEnum
    cite: "SPC-001 §5.1.1 Fig 5.1-3, Table 5.1-2; RECEIVED may not be reported; ACCEPTED/REJECTED/CANCELED terminal"
    values: [RECEIVED, ACCEPTED, REJECTED, CANCELED]

  - name: MessageModeEnum
    cite: "XSD MessageModeEnum"
    values: [LIVE, EXERCISE, SIMULATION, NONEXERCISE_SIMULATION]

# --- Envelope (wraps every placed message) ---------------------------------
# uci:MessageType = SecurityInformation + MessageHeader (uci:HeaderType).
envelope:
  - name: MessageType
    cite: "XSD MessageType — abstract envelope"
    fields:
      - { name: SecurityInformation, required: true, cite: "read-only marking chip; type in UCI_SecurityMarkings (not vendored)" }
      - { name: MessageHeader, ref: HeaderType, required: true }

  - name: HeaderType
    cite: "XSD HeaderType"
    fields:
      - { name: SystemID, required: true, cite: "player-filled (beat 1); missing SystemID => ENV HeaderType finding" }
      - { name: Timestamp, required: true, cite: "XSD HeaderType (DateTimeType)" }
      - { name: SchemaVersion, required: true, cite: "XSD HeaderType (UCI_SchemaVersionStringType)" }
      - { name: Mode, enum: MessageModeEnum, required: false }
      - { name: ServiceID, required: false, cite: "optional; omitted from the 4-field inspector" }
      - { name: MissionID, required: false, cite: "optional; omitted from the 4-field inspector" }

# --- Command-2 pattern: request + response ---------------------------------
# Commander (you) -> Commandee (SystemB). UNIS §4.6 CERT UNIS-000105;
# structure SPC-001 §5.1.1 CERT SCH-002461 (*Command / *CommandStatus suffixes).
messages:
  - name: TaskCommand
    mt: TaskCommandMT
    role: request
    cite: "UNIS §4.6 CERT UNIS-000105; SPC-001 §5.1.1 CERT SCH-002461; XSD TaskCommand / TaskCommandMT"
    fields:
      - { name: CommandID, ref: ID_Type, required: true, cite: "ID_Type.UUID; RQMT USTD-000436 (Leach-Salz/nil), RQMT USTD-000673 (canonical string)" }
      - { name: CommandState, enum: CommandStateEnum, required: true }

  - name: TaskCommandStatus
    mt: TaskCommandStatusMT
    role: response
    cite: "UNIS §4.6 CERT UNIS-000105; SPC-001 §5.1.1 CERT SCH-002461; XSD TaskCommandStatus / TaskCommandStatusMT"
    fields:
      - { name: CommandID, ref: ID_Type, required: true, cite: "correlation key back to the TaskCommand" }
      - { name: CommandProcessingState, enum: CommandProcessingStateEnum, required: true }

# --- Shared base types referenced above ------------------------------------
types:
  - name: ID_Type
    cite: "XSD ID_Type = UUID + optional DescriptiveLabel"
    fields:
      - { name: UUID, required: true }
      - { name: DescriptiveLabel, required: false }

# --- Validator findings (compose gate, battery V1–V10) ---------------------
# The verbatim `quote` of each finding is grep-verified against the file named by
# `source` (whitespace-normalized) by tools/check-fidelity.ts — the "quotes the
# standard verbatim" guarantee. `code` carries the honest prefix (docs/02 lie #11):
# ENV = XSD validity, CERT/RQMT = interaction/style/compliance requirements, and
# game-rule findings (READY gate, mode-match) carry no standard quote.
findings:
  - id: V1-systemid
    code: "ENV HeaderType"
    message: "MessageHeader missing required SystemID"
    source: xsd
    docRef: "XSD HeaderType"
    quote: "This element represents the SystemID of the System that sent this message."

  - id: V2-timestamp
    code: "ENV HeaderType"
    message: "Timestamp missing or not ISO-8601"
    source: xsd
    docRef: "XSD HeaderType (DateTimeType)"
    quote: "This element represents the time and date at which the message was created and ready to be sent."

  - id: V3-schemaversion
    code: "ENV HeaderType"
    message: "SchemaVersion missing or malformed"
    source: xsd
    docRef: "XSD HeaderType / UCI_SchemaVersionStringType"
    quote: "Indicates the schema version used to generate the message."

  - id: V4-mode-enum
    code: "ENV HeaderType"
    message: "Mode is not a valid MessageModeEnum value"
    source: xsd
    docRef: "XSD HeaderType / MessageModeEnum"
    quote: "See enumeration values for details."

  - id: V4-mode-mismatch
    code: "ENV HeaderType"
    message: "Mode does not match the sheet's declared mode"
    source: game-rule
    docRef: "game rule (mode-match, docs/02 lie #3)"

  - id: V5-uuid-invalid
    code: "RQMT USTD-000436"
    message: "CommandID is not a valid RFC-4122 UUID"
    source: std
    docRef: "STD-001 §3"
    quote: "UCI UUIDs shall conform to any version of the Leach-Salz UUID variant (variant 1) or the nil UUID described in RFC 4122."

  - id: V6-uuid-noncanonical
    code: "RQMT USTD-000673"
    message: "CommandID is not in canonical UUID string form"
    source: std
    docRef: "STD-001 §3"
    quote: "UCI UUIDs shall conform to the UUID string representation"

  - id: V7-commandstate
    code: "ENV CommandBaseType"
    message: "CommandState is not a valid CommandStateEnum value"
    source: xsd
    docRef: "XSD CommandBaseType"
    quote: "The state of the command message data."

  - id: V8-binding
    code: "CERT SCH-002461"
    message: "request/response must be named <MsgName>Command / <MsgName>CommandStatus"
    source: spc
    docRef: "SPC-001 §5.1.1"
    quote: "All Command-2 primitive types shall consist of two messages with names of the form"

  - id: V9-roles
    code: "CERT UNIS-000105"
    message: "both Command-2 roles must be bound to lifelines"
    source: unis
    docRef: "UNIS §4.6"
    quote: "A UCI Component fulfilling a role identified in the Command-2 message interaction pattern shall follow the interaction pattern"

  - id: V10-terminal-handler
    code: "READY"
    message: "no handler wired for a reachable terminal state"
    source: game-rule
    docRef: "game rule (READY gate)"
